name: CI Spring Boot

on:
  push:
    branches: ["develop"]
  pull_request:
    branches:["main"]

jobs:
  build:
    runs_on: ubuntu-lastest
    steps:
    - uses: action/checkout@v3
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Dar permisos a gradlew
      run: chmod +x gradlew 
    - name: Build with gradlew 
      run: ./gradlew build